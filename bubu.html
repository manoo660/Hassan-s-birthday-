<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday Hassan! 🐼❤️</title>
    <style>
        * {
            box-sizing: border-box;
        }
        body {
            background: linear-gradient(135deg, #fff0f5, #ffe4e1);
            color: #5d4037;
            font-family: 'Comic Sans MS', 'Chalkboard SE', 'Bubblicious', sans-serif;
            text-align: center;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }
        
        /* Floating Hearts & Bubbles Background */
        .hearts-container {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            overflow: hidden;
            z-index: 1;
            pointer-events: none;
        }
        .heart {
            position: absolute;
            bottom: -50px;
            font-size: 20px;
            animation: floatUp 6s linear infinite;
            opacity: 0.6;
        }

        @keyframes floatUp {
            0% { transform: translateY(0) translateX(0) scale(0.8); opacity: 0; }
            10% { opacity: 0.8; }
            50% { transform: translateY(-50vh) translateX(20px) scale(1.2); }
            100% { transform: translateY(-110vh) translateX(-20px) scale(0.8); opacity: 0; }
        }

        /* Main Cute Card */
        .card {
            background: rgba(255, 255, 255, 0.85);
            border: 3px solid #ffb6c1;
            padding: 35px 25px;
            border-radius: 30px;
            box-shadow: 0 10px 30px rgba(255, 182, 193, 0.5);
            max-width: 400px;
            width: 90%;
            z-index: 2;
            position: relative;
        }

        .bubu-dudu-box {
            font-size: 4.5rem;
            margin: 10px 0;
            animation: bounce 1.2s infinite alternate;
        }

        @keyframes bounce {
            0% { transform: translateY(0); }
            100% { transform: translateY(-10px); }
        }

        h1 {
            color: #ff69b4;
            font-size: 2.2rem;
            margin: 10px 0;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.1);
        }

        .nickname {
            font-size: 1.3rem;
            color: #ff85a2;
            font-weight: bold;
            margin-bottom: 15px;
        }

        p {
            font-size: 1.05rem;
            line-height: 1.6;
            color: #6d4c41;
            background: #fff5f7;
            padding: 15px;
            border-radius: 20px;
            border: 1px dashed #ffb6c1;
        }

        .btn {
            background: linear-gradient(135deg, #ff69b4, #ff85a2);
            color: white;
            border: none;
            padding: 14px 28px;
            font-size: 1.1rem;
            font-weight: bold;
            border-radius: 25px;
            cursor: pointer;
            transition: 0.3s ease;
            box-shadow: 0 5px 15px rgba(255, 105, 180, 0.3);
            width: 100%;
            margin-top: 15px;
        }
        .btn:hover {
            transform: scale(1.05);
            box-shadow: 0 8px 20px rgba(255, 105, 180, 0.5);
        }

        .footer-hearts {
            font-size: 1.5rem;
            margin-top: 15px;
        }
    </style>
</head>
<body>

    <div class="hearts-container" id="heartsContainer"></div>

    <div class="card">
        <!-- Bubu Dudu Animated Emojis -->
        <div class="bubu-dudu-box">🐼❤️🐹</div>
        
        <h1>Happy Birthday Hassan!</h1>
        <div class="nickname">My Bubu / Dudu ✨</div>
        
        <p>Wishing the cutest person ever a very Happy Birthday! 🎂 May your day be filled with lots of love, endless happy moments, and sweet hugs just like Bubu & Dudu! 🐾💖</p>
        
        <button class="btn" onclick="showSurprise()">Tap for virtual hugs! 🤗</button>
        
        <div class="footer-hearts">💖✨🌸✨💖</div>
    </div>

    <!-- Cute Background Music Option -->
    <audio id="cuteMusic" src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3" loop></audio>

    <script>
        // Floating Hearts Generator
        const heartIcons = ['❤️', '💖', '✨', '🌸', '💕', '🐾'];
        const container = document.getElementById('heartsContainer');
        
        for (let i = 0; i < 25; i++) {
            let heart = document.createElement('div');
            heart.classList.add('heart');
            heart.innerHTML = heartIcons[Math.floor(Math.random() * heartIcons.length)];
            heart.style.left = Math.random() * 100 + '%';
            heart.style.animationDelay = Math.random() * 5 + 's';
            heart.style.fontSize = (Math.random() * 15 + 15) + 'px';
            container.appendChild(heart);
        }

        function showSurprise() {
            // Music Play
            var music = document.getElementById("cuteMusic");
            if (music.paused) {
                music.play().catch(e => console.log("Audio started"));
            }
            alert("🐼❤️🐹\nSending you 10000+ virtual hugs and kisses, Hassan! Have the happiest and sweetest birthday ever! 🎉🍰");
        }
    </script>
</body>
                                                                              </html>
