<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday Hassan!</title>
    <style>
        body {
            background: linear-gradient(135deg, #fedac2, #edb5bf);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            text-align: center;
            color: #333;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }
        .card {
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            max-width: 400px;
            width: 90%;
            animation: float 3s ease-in-out infinite;
        }
        h1 {
            color: #ff4a5a;
            font-size: 2.5rem;
            margin-bottom: 10px;
        }
        p {
            font-size: 1.1rem;
            line-height: 1.6;
        }
        .cake {
            font-size: 4rem;
            margin: 20px 0;
        }
        .btn {
            background-color: #ff4a5a;
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 1rem;
            border-radius: 25px;
            cursor: pointer;
            transition: 0.3s;
        }
        .btn:hover {
            background-color: #e03b4a;
            transform: scale(1.05);
        }
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
    </style>
</head>
<body>

    <div class="card">
        <div class="cake">🎂🎈</div>
        <h1>Happy Birthday Hassan!</h1>
        <p>Wishing you a day filled with love, laughter, and endless happiness. May all your dreams come true! ✨</p>
        <button class="btn" onclick="celebrate()">Click for Surprise 🎉</button>
    </div>

    <script>
        function celebrate() {
            alert("🎉 Happy Birthday Hassan! Have an amazing year ahead! 🚀");
        }
    </script>

</body>
</html>
